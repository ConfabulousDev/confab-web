name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm run test -- --run

      - name: Build Storybook
        working-directory: frontend
        run: npm run build-storybook

  backend-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"
          cache-dependency-path: backend/go.sum

      - name: Unit tests
        working-directory: backend
        run: go test -short -timeout 15m ./...

  backend-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: db-session
            run: go test -timeout 15m ./internal/db/session/...
          - shard: db-access
            run: go test -timeout 15m ./internal/db/access/...
          - shard: db-auth
            run: go test -timeout 15m ./internal/db/dbauth/...
          - shard: db-user
            run: go test -timeout 15m ./internal/db/user/...
          - shard: db-root
            run: go test -timeout 15m ./internal/db
          - shard: api
            run: go test -timeout 15m ./internal/api/...
          - shard: auth
            run: go test -timeout 15m ./internal/auth/...
          - shard: analytics
            run: go test -timeout 15m ./internal/analytics/...
          - shard: other
            run: go test -timeout 15m ./internal/storage/... ./internal/admin/... ./internal/anthropic/... ./internal/clientip/... ./internal/email/... ./internal/ratelimit/... ./internal/validation/...

    name: backend-integration (${{ matrix.shard }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"
          cache-dependency-path: backend/go.sum

      - name: Integration tests
        working-directory: backend
        run: ${{ matrix.run }}

  docker-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: confab-test:latest

      - name: Smoke test - server binary
        run: docker run --rm confab-test:latest test -x ./confab

      - name: Smoke test - migrate binary
        run: docker run --rm confab-test:latest migrate -help

      - name: Smoke test - migrate wrapper
        run: |
          docker run --rm confab-test:latest sh -c '
            # Should fail with missing DATABASE_URL
            if ./migrate_db.sh 2>&1; then
              echo "Expected migrate_db.sh to fail without DATABASE_URL"
              exit 1
            fi
          '

      - name: Smoke test - migration files present
        run: docker run --rm confab-test:latest ls /app/migrations/

  ci-summary:
    if: always()
    needs: [frontend, backend-unit, backend-integration, docker-smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.frontend.result }}" != "success" ||
                "${{ needs.backend-unit.result }}" != "success" ||
                "${{ needs.backend-integration.result }}" != "success" ||
                "${{ needs.docker-smoke-test.result }}" != "success" ]]; then
            echo "One or more jobs failed:"
            echo "  frontend: ${{ needs.frontend.result }}"
            echo "  backend-unit: ${{ needs.backend-unit.result }}"
            echo "  backend-integration: ${{ needs.backend-integration.result }}"
            echo "  docker-smoke-test: ${{ needs.docker-smoke-test.result }}"
            exit 1
          fi
          echo "All jobs passed!"
